<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード変更 | PT事業部</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f7f8; color: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card { background: #fff; border: 1px solid #e8e8ed; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .title { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #aaa; margin-bottom: 32px; }
  .notice { background: #fff7f1; border: 1px solid #f0e4da; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #b08968; margin-bottom: 24px; line-height: 1.6; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%; padding: 10px 14px; border: 1px solid #e0e0e8;
    border-radius: 8px; font-size: 14px; color: #1a1a2e;
    background: #fafafa; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: #5a9cf8; background: #fff; }

  .save-btn { width: 100%; background: #1a1a2e; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .save-btn:hover { background: #2a2a4e; }
  .save-btn:disabled { background: #ccc; cursor: not-allowed; }

  .error-msg { color: #ef4444; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  .success-msg { color: #2eb872; font-size: 13px; margin-top: 12px; text-align: center; display: none; }

  .skip-link { display: block; text-align: center; font-size: 12px; color: #aaa; margin-top: 16px; cursor: pointer; text-decoration: underline; }
  .logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .logo-badge { display: inline-flex; flex-direction: column; line-height: 1.1; }
  .logo-badge .main-text { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; color: #005bac; }
  .logo-badge .company-type { font-size: 10px; color: #8a7a6d; font-weight: 400; margin-top: 1px; }
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap"><div class="logo-badge"><div class="logo-badge"><span class="main-text">DGLOSS</span><span class="company-type">株式会社ディグロス</span></div></div></div>
  <div class="title">パスワード変更</div>
  <div class="sub" id="sub-text">新しいパスワードを設定してください</div>

  <div class="notice" id="forced-notice" style="display:none">
    初回ログインのため、パスワードの変更が必要です。変更が完了するまで他の画面には進めません。
  </div>

  <div class="form-group">
    <label>新しいパスワード（8文字以上）</label>
    <input type="password" id="new-password" placeholder="新しいパスワード" autocomplete="new-password">
  </div>

  <div class="form-group">
    <label>新しいパスワード（確認）</label>
    <input type="password" id="new-password-confirm" placeholder="もう一度入力してください" autocomplete="new-password">
  </div>

  <button class="save-btn" id="save-btn" onclick="changePassword()">変更する</button>
  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <a class="skip-link" id="skip-link" style="display:none" onclick="goBack()">戻る</a>
</div>

<script>
const BASE_URL = "https://digross-server.onrender.com";

const token = localStorage.getItem("staff_token");
const role = localStorage.getItem("staff_role");
const staffId = localStorage.getItem("staff_id");

if (!token) {
  window.location.href = "login.html";
}

// URLに ?optional=1 がついていれば「本人が任意で変更」モード（スキップ可能）
const isOptional = new URLSearchParams(window.location.search).get("optional") === "1";

if (isOptional) {
  document.getElementById("sub-text").textContent = "パスワードを変更します";
  document.getElementById("skip-link").style.display = "block";
} else {
  document.getElementById("forced-notice").style.display = "block";
}

function goBack() {
  if (role === "admin") {
    window.location.href = "index.html";
  } else {
    const month = new Date().toISOString().slice(0, 7);
    window.location.href = `staff.html?id=${staffId}&month=${month}`;
  }
}

document.getElementById("new-password-confirm").addEventListener("keydown", e => {
  if (e.key === "Enter") changePassword();
});

async function changePassword() {
  const pw1 = document.getElementById("new-password").value.trim();
  const pw2 = document.getElementById("new-password-confirm").value.trim();
  const btn = document.getElementById("save-btn");
  const errMsg = document.getElementById("error-msg");
  const okMsg = document.getElementById("success-msg");

  errMsg.style.display = "none";
  okMsg.style.display = "none";

  if (!pw1 || !pw2) {
    errMsg.textContent = "両方の項目を入力してください";
    errMsg.style.display = "block";
    return;
  }
  if (pw1.length < 8) {
    errMsg.textContent = "パスワードは8文字以上で入力してください";
    errMsg.style.display = "block";
    return;
  }
  if (pw1 !== pw2) {
    errMsg.textContent = "パスワードが一致しません";
    errMsg.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "変更中...";

  try {
    const res = await fetch(`${BASE_URL}/staff/change_password`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ new_password: pw1 })
    });
    const data = await res.json();

    if (data.error) {
      errMsg.textContent = data.error;
      errMsg.style.display = "block";
      return;
    }

    okMsg.textContent = "変更が完了しました";
    okMsg.style.display = "block";
    setTimeout(goBack, 1000);

  } catch(e) {
    errMsg.textContent = "通信エラーが発生しました";
    errMsg.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "変更する";
  }
}
</script>
</body>
</html>
