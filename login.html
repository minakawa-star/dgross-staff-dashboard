<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f7f8; color: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .login-card { background: #fff; border: 1px solid #e8e8ed; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .login-title { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: #aaa; margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 6px; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 10px 14px; border: 1px solid #e0e0e8;
    border-radius: 8px; font-size: 14px; color: #1a1a2e;
    background: #fafafa; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: #5a9cf8; background: #fff; }

  .login-btn { width: 100%; background: #1a1a2e; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .login-btn:hover { background: #2a2a4e; }
  .login-btn:disabled { background: #ccc; cursor: not-allowed; }

  .error-msg { color: #ef4444; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  .logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .logo-badge { background: #000; border-radius: 10px; padding: 10px 20px; display: inline-flex; align-items: center; }
  .logo-badge img { height: 48px; display: block; }
</style>

    <input type="password" id="password" placeholder="パスワード" autocomplete="current-password">
  </div>

  <button class="login-btn" id="login-btn" onclick="login()">ログイン</button>
  <div class="error-msg" id="error-msg"></div>
</div>

<script>
const BASE_URL = "https://digross-server.onrender.com";

fetch(BASE_URL + "/health_staff").catch(() => {});

// Enterキーでログイン
document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

async function login() {
  const loginId = document.getElementById("login-id").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.getElementById("login-btn");
  const errMsg = document.getElementById("error-msg");

  errMsg.style.display = "none";

  if (!loginId || !password) {
    errMsg.textContent = "IDとパスワードを入力してください";
    errMsg.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "ログイン中...";

  try {
    const res = await fetch(`${BASE_URL}/staff/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ login_id: loginId, password })
    });
    const data = await res.json();

    if (data.error) {
      errMsg.textContent = data.error;
      errMsg.style.display = "block";
      return;
    }

    localStorage.setItem("staff_token", data.token);
    localStorage.setItem("staff_id", data.staff_id);
    localStorage.setItem("staff_role", data.role);
    localStorage.setItem("staff_name", data.name);

    if (!data.password_changed) {
      window.location.href = "password_change.html";
      return;
    }

    if (data.role === "admin") {
      window.location.href = "index.html";
    } else {
      const month = new Date().toISOString().slice(0, 7);
      window.location.href = `staff.html?id=${data.staff_id}&month=${month}`;
    }

  } catch(e) {
    errMsg.textContent = "通信エラーが発生しました";
    errMsg.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "ログイン";
  }
}
</script>
</body>
</html>
