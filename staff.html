<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実績確認</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fdfaf7; color: #2a2622; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

  .header { background: #fff; border-bottom: 1px solid #f0e4da; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-title { font-size: 16px; font-weight: 700; color: #2a2622; }
  .logo-badge { background: #000; border-radius: 8px; padding: 4px 10px; display: flex; align-items: center; height: 36px; }
  .logo-badge img { height: 26px; display: block; }
  .header-sub { font-size: 13px; color: #b08968; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .logout-btn { background: transparent; border: 1px solid #f0e4da; color: #b08968; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .logout-btn:hover { border-color: #e8a87c; color: #2a2622; }
  .back-btn { background: #fff7f1; border: 1px solid #e8a87c; color: #d97a3f; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .back-btn:hover { background: #fdeee3; }

  select, input[type="month"] {
    background: #fff7f1; border: 1px solid #f0e4da; color: #2a2622;
    padding: 6px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; outline: none;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* メインサマリー */
  .main-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 760px) { .main-grid { grid-template-columns: 1fr; } }

  .summary-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 24px; }
  .summary-title { font-size: 13px; font-weight: 700; color: #2a2622; margin-bottom: 4px; }
  .summary-sub { font-size: 11px; color: #c9a07a; margin-bottom: 16px; }

  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table td { padding: 10px 0; border-bottom: 1px solid #f7eee5; font-size: 13px; }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table td:first-child { color: #8a7a6d; }
  .summary-table td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  .plus { color: #d97a3f; }
  .minus { color: #d9534f; }
  .blue { color: #5a9cf8; }

  /* ドーナツカード */
  .gauge-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge-card-title { font-size: 13px; font-weight: 700; color: #2a2622; margin-bottom: 16px; align-self: flex-start; }
  .donut-wrap { position: relative; width: 180px; height: 180px; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .donut-rate { font-size: 28px; font-weight: 800; }
  .donut-label { font-size: 11px; color: #c9a07a; margin-top: 2px; }
  .donut-status { margin-top: 16px; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .status-achieve { background: #fdeee3; color: #d97a3f; }
  .status-maintain { background: #fff4e0; color: #cf9a3a; }
  .status-under { background: #fdecec; color: #d9534f; }

  /* KPIグリッド */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  @media (max-width: 760px) { .kpi-grid { grid-template-columns: 1fr; } }
  .kpi-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 18px 20px; }
  .kpi-label { font-size: 12px; color: #c9a07a; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 800; color: #2a2622; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 11px; color: #c9a07a; margin-top: 4px; }
  .kpi-green { color: #d97a3f; }
  .kpi-yellow { color: #cf9a3a; }
  .kpi-red { color: #d9534f; }

  /* バー */
  .bar-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .bar-title { font-size: 13px; font-weight: 700; color: #2a2622; margin-bottom: 20px; }
  .bar-wrap { position: relative; height: 14px; background: #f7eee5; border-radius: 7px; overflow: visible; margin-bottom: 28px; }
  .bar-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg,#f3c19c,#e8a87c); transition: width 0.6s ease; position: relative; z-index: 1; }
  .bar-milestone { position: absolute; top: -6px; height: 26px; width: 3px; border-radius: 2px; z-index: 3; transform: translateX(-50%); }
  .bar-milestone.maintain { background: #cf9a3a; box-shadow: 0 0 0 2px #fff; }
  .bar-milestone.achieve { background: #d97a3f; box-shadow: 0 0 0 2px #fff; }
  .bar-milestone-flag { position: absolute; top: -34px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 4px; color: #fff; }
  .bar-milestone-flag.maintain { background: #cf9a3a; }
  .bar-milestone-flag.achieve { background: #d97a3f; }
  .bar-milestone-flag::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; }
  .bar-milestone-flag.maintain::after { border-top-color: #cf9a3a; }
  .bar-milestone-flag.achieve::after { border-top-color: #d97a3f; }
  .bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: #c9a07a; }

  /* 出勤予定数入力 */
  .planned-input { width: 70px; padding: 8px; border: 1px solid #f5e6d8; border-radius: 8px; font-size: 18px; font-weight: 700; text-align: center; color: #2a2622; background: #fff7f1; }
  .planned-save-btn { background: #e8a87c; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .planned-save-btn:hover { background: #d97a3f; }
  .planned-save-btn:disabled { background: #f0e4da; color: #c9a07a; cursor: not-allowed; }

  /* FB内訳カード */
  .fb-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; margin-bottom: 16px; overflow: hidden; }
  .fb-header { padding: 16px 24px; border-bottom: 1px solid #f7eee5; font-size: 13px; font-weight: 700; color: #2a2622; display: flex; justify-content: space-between; align-items: center; }
  .fb-total { font-size: 16px; font-weight: 800; color: #5a9cf8; }
  .fb-table { width: 100%; border-collapse: collapse; }
  .fb-table td { padding: 10px 24px; border-bottom: 1px solid #f7eee5; font-size: 13px; }
  .fb-table tr:last-child td { border-bottom: none; }
  .fb-table td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  .fb-cat-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 8px; }

  /* モーダル */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(42,38,34,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border: 1px solid #f0e4da; border-radius: 14px; padding: 28px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; margin: 16px; }
  .modal-title { font-size: 16px; font-weight: 700; color: #2a2622; margin-bottom: 18px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: transparent; border: 1px solid #f0e4da; color: #c9a07a; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .fb-cat-default { background: #eaf2fd; color: #5a9cf8; }
  .fb-cat-bonus { background: #eafaf0; color: #2eb872; }
  .fb-cat-penalty { background: #fdecec; color: #d9534f; }
  .fb-empty { padding: 24px; text-align: center; color: #c9a07a; font-size: 13px; }
  .fb-count { font-size: 11px; color: #c9a07a; margin-left: 6px; }

  /* インセンティブカード */
  .inc-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; margin-bottom: 16px; overflow: hidden; }
  .inc-header { padding: 16px 24px; border-bottom: 1px solid #f7eee5; font-size: 13px; font-weight: 700; color: #2a2622; display: flex; justify-content: space-between; align-items: center; }
  .inc-total { font-size: 18px; font-weight: 800; color: #d97a3f; }
  .inc-body { padding: 16px 24px; }
  .inc-table { width: 100%; border-collapse: collapse; }
  .inc-table td { padding: 6px 0; font-size: 12px; color: #8a7a6d; }
  .inc-table td:last-child { text-align: right; font-weight: 600; color: #2a2622; font-variant-numeric: tabular-nums; }
  .inc-na { padding: 24px; text-align: center; color: #c9a07a; font-size: 13px; }
  .inc-formula { font-size: 11px; color: #c9a07a; margin-top: 12px; line-height: 1.6; padding-top: 12px; border-top: 1px solid #f7eee5; }

  .loading { text-align: center; padding: 60px; color: #c9a07a; }

  /* カレンダーカード */
  .calendar-card { background: #fff; border: 1px solid #f5e6d8; border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .calendar-title { font-size: 13px; font-weight: 700; color: #2a2622; margin-bottom: 4px; }
  .calendar-sub { font-size: 11px; color: #c9a07a; margin-bottom: 16px; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .calendar-dow { text-align: center; font-size: 11px; font-weight: 700; color: #c9a07a; padding-bottom: 4px; }
  .calendar-cell { background: #fff7f1; border: 1px solid #f0e4da; border-radius: 8px; padding: 6px 5px; min-height: 88px; display: flex; flex-direction: column; gap: 3px; }
  .calendar-cell.empty { background: transparent; border: none; }
  .calendar-cell.today { border-color: #e8a87c; border-width: 2px; }
  .calendar-cell.clickable { cursor: pointer; transition: all 0.15s; }
  .calendar-cell.clickable:hover { background: #fff0e3; border-color: #e8a87c; transform: translateY(-1px); }
  .calendar-day-num { font-size: 11px; color: #8a7a6d; font-weight: 600; }
  .calendar-apo { font-size: 10.5px; color: #d97a3f; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.3; }
  .calendar-cxl { font-size: 10.5px; color: #d9534f; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.3; }
  .calendar-net { font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: auto; padding-top: 3px; border-top: 1px solid #f0e4da; }
  .calendar-net.positive { color: #2eb872; }
  .calendar-net.negative { color: #d9534f; }
  .calendar-net.zero { color: #c9a07a; }
  @media (max-width: 600px) {
    .calendar-cell { min-height: 76px; padding: 5px 3px; }
    .calendar-apo, .calendar-cxl { font-size: 9.5px; }
    .calendar-net { font-size: 10px; }
  }
</style>
</head>

        <div class="kpi-label">達成まであと</div>
        <div class="kpi-value" id="kpi-remain">-</div>
        <div class="kpi-sub" id="kpi-remain-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">時給</div>
        <div class="kpi-value" id="info-wage">-</div>
        <div class="kpi-sub">本人ステータス基準</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label" id="work-days-label">出勤日数</div>
        <div class="kpi-value" id="info-days">-</div>
        <div class="kpi-sub" id="work-days-sub">当月実績</div>
      </div>
    </div>

    <!-- 出勤予定数入力 -->
    <div class="kpi-grid" id="planned-grid" style="grid-template-columns: 1fr;">
      <div class="kpi-card" id="planned-card">
        <div class="kpi-label">今月の出勤予定数</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <input type="number" class="planned-input" id="planned-input" min="0" max="31">
          <span style="font-size:14px;color:#8a7a6d">日</span>
          <button class="planned-save-btn" id="planned-save-btn" onclick="savePlannedDays()">保存</button>
        </div>
        <div class="kpi-sub" id="planned-msg">この月の目標値は、ここで設定した出勤予定数を基準に計算されます</div>
      </div>
    </div>

    <!-- 目標バー -->
    <div class="bar-card">
      <div class="bar-title">目標達成状況</div>
      <div class="bar-wrap">
        <div class="bar-fill" id="bar-fill"></div>
        <div class="bar-milestone maintain" id="bar-maintain">
          <div class="bar-milestone-flag maintain" id="bar-maintain-flag">維持目標</div>
        </div>
        <div class="bar-milestone achieve" id="bar-achieve" style="left:100%">
          <div class="bar-milestone-flag achieve" id="bar-achieve-flag">達成目標</div>
        </div>
      </div>
      <div class="bar-labels">
        <span>¥0</span>
        <span id="bar-current-label">現在の売上</span>
      </div>
    </div>

    <!-- 日別カレンダー -->
    <div class="calendar-card">
      <div class="calendar-title">日別実績カレンダー</div>
      <div class="calendar-sub">アポイント日基準。各日の上段＝アポ取得、下段＝キャンセル、最下部＝差額。日付クリックで明細表示</div>
      <div class="calendar-grid" id="calendar-grid">
        <div class="calendar-dow">日</div>
        <div class="calendar-dow">月</div>
        <div class="calendar-dow">火</div>
        <div class="calendar-dow">水</div>
        <div class="calendar-dow">木</div>
        <div class="calendar-dow">金</div>
        <div class="calendar-dow">土</div>
      </div>
    </div>

  </div>
</div>

<!-- 日別明細モーダル -->
<div class="modal-overlay" id="calendar-detail-modal">
  <div class="modal">
    <div class="modal-title" id="calendar-detail-title">日別実績</div>
    <table style="width:100%;border-collapse:collapse">
      <tbody id="calendar-detail-body"></tbody>
    </table>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeCalendarDetailModal()">閉じる</button>
    </div>
  </div>
</div>


<script>
const BASE_URL = "https://digross-server.onrender.com";

fetch(BASE_URL + "/health_staff").catch(() => {});

const token = localStorage.getItem("staff_token");
const storedStaffId = localStorage.getItem("staff_id");
const role = localStorage.getItem("staff_role");

if (!token) {
  window.location.href = "login.html";
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { staffId: p.get("id"), month: p.get("month") || new Date().toISOString().slice(0, 7) };
}

const { staffId, month } = getParams();

if (role !== "admin" && staffId !== storedStaffId) {
  window.location.href = `staff.html?id=${storedStaffId}&month=${month}`;
}

if (role === "admin") {
  document.getElementById("back-to-admin-btn").style.display = "inline-flex";
}

document.getElementById("month-select").value = month;

document.getElementById("month-select").addEventListener("change", e => {
  const url = new URL(window.location.href);
  url.searchParams.set("month", e.target.value);
  window.location.href = url.toString();
});

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

async function loadData() {
  if (!staffId) {
    document.getElementById("loading").textContent = "URLにスタッフIDが指定されていません";
    return;
  }
  try {
    const res = await fetch(`${BASE_URL}/staff/summary?month=${month}`);
    const data = await res.json();
    const staff = (data.data || []).find(d => d.staff_id === staffId);
    if (!staff) {
      document.getElementById("loading").textContent = "スタッフが見つかりません: " + staffId;
      return;
    }
    renderPage(staff);
    loadCalendar();
  } catch(e) {
    document.getElementById("loading").textContent = "読み込みエラー: " + e.message;
  }
}

async function loadCalendar() {
  try {
    const res = await fetch(`${BASE_URL}/staff/daily_calendar?staff_id=${staffId}&month=${month}`);
    const data = await res.json();
    renderCalendar(data.data || []);
  } catch(e) {
    console.error("カレンダー読み込みエラー:", e.message);
  }
}

let currentDailyMap = {};

function renderCalendar(dailyData) {
  const dailyMap = {};
  dailyData.forEach(d => { dailyMap[d.date] = d; });
  currentDailyMap = dailyMap;

  const [y, m] = month.split("-").map(Number);
  const firstDow = new Date(y, m - 1, 1).getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);

  const grid = document.getElementById("calendar-grid");
  // 曜日見出し以外をクリア
  grid.querySelectorAll(".calendar-cell").forEach(c => c.remove());

  for (let i = 0; i < firstDow; i++) {
    const empty = document.createElement("div");
    empty.className = "calendar-cell empty";
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const info = dailyMap[dateStr];
    const cell = document.createElement("div");
    const hasData = info && (info.apo_amount > 0 || info.cxl_amount > 0);
    cell.className = "calendar-cell" + (dateStr === todayStr ? " today" : "") + (hasData ? " clickable" : "");

    let inner = `<div class="calendar-day-num">${day}</div>`;
    if (hasData) {
      if (info.apo_amount > 0) inner += `<div class="calendar-apo">売上：${fmtYen(info.apo_amount)}</div>`;
      if (info.cxl_amount > 0) inner += `<div class="calendar-cxl">CXL：${fmtYen(info.cxl_amount)}</div>`;
      const netCls = info.net_amount > 0 ? "positive" : info.net_amount < 0 ? "negative" : "zero";
      inner += `<div class="calendar-net ${netCls}">${fmtYenSigned(info.net_amount)}</div>`;
    }
    cell.innerHTML = inner;
    if (hasData) {
      cell.onclick = () => openCalendarDetailModal(dateStr);
    }
    grid.appendChild(cell);
  }
}

function openCalendarDetailModal(dateStr) {
  const info = currentDailyMap[dateStr];
  if (!info) return;

  document.getElementById("calendar-detail-title").textContent = dateStr + "の実績";
  const items = info.items || [];
  const tbody = document.getElementById("calendar-detail-body");

  if (items.length === 0) {
    tbody.innerHTML = `<tr><td style="padding:14px;text-align:center;color:#c9a07a">案件データがありません</td></tr>`;
  } else {
    tbody.innerHTML = items.map(item => {
      const color = item.is_cancel ? "#d9534f" : "#2a2622";
      const label = item.is_cancel ? "CXL" : "アポ";
      const labelCls = item.is_cancel ? "fb-cat-penalty" : "fb-cat-bonus";
      return `<tr style="border-bottom:1px solid #f7eee5">
        <td style="padding:8px 10px"><span class="fb-cat-badge ${labelCls}">${label}</span> ${item.project_name}</td>
        <td class="num" style="padding:8px 10px;text-align:right;color:${color}">${fmtYen(item.amount)}</td>
      </tr>`;
    }).join("");
  }

  document.getElementById("calendar-detail-modal").classList.add("active");
}
function closeCalendarDetailModal() {
  document.getElementById("calendar-detail-modal").classList.remove("active");
}

function fmtYen(n) {
  if (n == null) return "-";
  return "¥" + Math.abs(n).toLocaleString();
}

function fmtYenSigned(n) {
  if (n == null) return "-";
  const sign = n < 0 ? "▲" : "";
  return sign + "¥" + Math.abs(n).toLocaleString();
}

function fbCatClass(category) {
  if (!category) return "fb-cat-default";
  if (category.includes("ペナルティ")) return "fb-cat-penalty";
  if (category.includes("ボーナス") || category.includes("達成評価")) return "fb-cat-bonus";
  return "fb-cat-default";
}

function renderFbBreakdown(d) {
  const breakdown = d.fb_breakdown || [];
  const tbody = document.getElementById("fb-breakdown-body");

  if (breakdown.length === 0) {
    tbody.innerHTML = `<tr><td class="fb-empty" colspan="2">対象のFBはありません</td></tr>`;
  } else {
    tbody.innerHTML = breakdown.map(item => {
      const cls = fbCatClass(item.category);
      const countLabel = item.count != null ? `<span class="fb-count">（${item.count}件）</span>` : "";
      const amountColor = item.amount < 0 ? "minus" : "";
      return `<tr>
        <td><span class="fb-cat-badge ${cls}">${item.category || "その他"}</span>${item.name || ""}${countLabel}</td>
        <td class="${amountColor}">${fmt(item.amount)}</td>
      </tr>`;
    }).join("");
  }

  document.getElementById("fb-total").textContent = fmt(d.fb_amount);
}

function renderIncentive(d) {
  const totalEl = document.getElementById("inc-total");
  const bodyEl = document.getElementById("inc-body");

  if (d.incentive_status !== "ok" || d.incentive_target == null) {
    totalEl.textContent = "-";
    bodyEl.innerHTML = `<div class="inc-na">${d.incentive_status}</div>`;
    return;
  }

  totalEl.textContent = fmt(d.incentive_target);

  const detail = d.incentive_detail || {};
  const ratePercent = detail.rate != null ? Math.round(detail.rate * 100) + "%" : "-";

  bodyEl.innerHTML = `
    <table class="inc-table">
      <tr><td>対象月（2ヶ月前）</td><td>${detail.prior_month || "-"}</td></tr>
      <tr><td>当該月の営業日数</td><td>${detail.prior_business_days ?? "-"}日</td></tr>
      <tr><td>出勤日数</td><td>${detail.prior_work_days ?? "-"}日</td></tr>
      <tr><td>休み日数</td><td>${detail.rest_days ?? "-"}日</td></tr>
      <tr><td>売上比重</td><td>${ratePercent}</td></tr>
      <tr><td>実費交通費</td><td>${fmt(detail.commute_allowance)}</td></tr>
      <tr><td>日割り目標金額</td><td>${fmt(detail.daily_target)}</td></tr>
    </table>
    <div class="inc-formula">
      日割り目標金額 = (時給×8 + 社保3,150円 + 実費交通費) × 売上比重<br>
      インセンティブ目標 = 日割り目標金額 × 出勤日数（${detail.prior_month || "-"}実績）
    </div>
  `;
}

function renderPage(d) {
  document.getElementById("staff-name").textContent = d.name;
  document.getElementById("staff-rank").textContent = d.rank + " / " + d.site;
  document.title = d.name + " | 実績確認";

  const rate = d.achieve_rate ?? 0;
  const remain = d.target_achieve > 0 ? d.target_achieve - d.sales : null;

  // サマリーテーブル
  document.getElementById("summary-sub").textContent = `${month} 月の売上実績`;
  document.getElementById("breakdown-body").innerHTML = `
    <tr><td>売上合計</td><td>${fmt(d.sales)}</td></tr>
    <tr><td>アポ取得金額</td><td class="plus">${fmt(d.apo_amount)}</td></tr>
    <tr><td>キャンセル金額</td><td class="minus">${d.cxl_amount > 0 ? '▲' + fmt(d.cxl_amount) : '-'}</td></tr>
    <tr><td>FB金額</td><td class="blue">${d.fb_amount > 0 ? fmt(d.fb_amount) : (d.fb_amount < 0 ? fmt(d.fb_amount) : '-')}</td></tr>
    <tr><td>達成目標</td><td>${d.target_achieve > 0 ? fmt(d.target_achieve) : '-'}</td></tr>
    <tr><td>維持目標</td><td>${d.target_maintain > 0 ? fmt(d.target_maintain) : '-'}</td></tr>
  `;

  // FB内訳
  renderFbBreakdown(d);

  // インセンティブ目標
  renderIncentive(d);

  // ドーナツ
  const circumference = 490;
  const pct = Math.min(rate, 150) / 150; // 150%でフル
  const offset = circumference * (1 - pct);
  const circle = document.getElementById("donut-circle");
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = rate >= 100 ? "#e8a87c" : rate >= 80 ? "#f0c987" : "#e89a9a";

  document.getElementById("donut-rate").textContent = d.achieve_rate != null ? d.achieve_rate + "%" : "-";
  document.getElementById("donut-rate").style.color = rate >= 100 ? "#d97a3f" : rate >= 80 ? "#cf9a3a" : "#d9534f";
  document.getElementById("donut-sub").textContent = `出勤 ${d.work_days}日`;

  const statusEl = document.getElementById("donut-status");
  if (rate >= 100) { statusEl.textContent = "達成"; statusEl.className = "donut-status status-achieve"; }
  else if (rate >= 80) { statusEl.textContent = "維持圏"; statusEl.className = "donut-status status-maintain"; }
  else { statusEl.textContent = "未達"; statusEl.className = "donut-status status-under"; }

  // KPI
  const remainEl = document.getElementById("kpi-remain");
  if (remain != null && remain > 0) {
    remainEl.textContent = fmt(remain);
    remainEl.className = "kpi-value kpi-red";
    document.getElementById("kpi-remain-sub").textContent = "達成目標まで";
  } else if (remain != null && remain <= 0) {
    remainEl.textContent = "達成！";
    remainEl.className = "kpi-value kpi-green";
    document.getElementById("kpi-remain-sub").textContent = fmt(Math.abs(remain)) + " 超過";
  } else {
    remainEl.textContent = "-";
    document.getElementById("kpi-remain-sub").textContent = "";
  }

  const wageEl = document.getElementById("info-wage");
  if (d.is_monthly) {
    wageEl.textContent = "月給制";
    wageEl.style.color = "#cf9a3a";
  } else {
    wageEl.textContent = d.hourly_wage > 0 ? "¥" + d.hourly_wage.toLocaleString() : "-";
  }

  // 出勤日数（実績）
  document.getElementById("info-days").textContent = d.work_days + "日";
  document.getElementById("work-days-sub").textContent = d.is_confirmed ? "確定済み（実績）" : "現時点の実績";

  // 出勤予定数入力欄
  const plannedCard = document.getElementById("planned-card");
  if (d.is_confirmed) {
    plannedCard.innerHTML = `
      <div class="kpi-label">出勤予定数（確定済）</div>
      <div class="kpi-value" style="color:#c9a07a">${d.planned_work_days}日</div>
      <div class="kpi-sub">この月は確定済みのため編集できません。目標値は実績出勤日数で計算されています。</div>
    `;
  } else {
    document.getElementById("planned-input").value = d.planned_work_days || "";
  }

  // 目標バー
  const maxVal = d.target_achieve > 0 ? d.target_achieve * 1.5 : d.sales * 1.5 || 1;
  const barWidth = Math.min((d.sales / maxVal) * 100, 100);
  document.getElementById("bar-fill").style.width = barWidth + "%";

  if (d.target_achieve > 0) {
    const maintainPos = Math.min((d.target_maintain / maxVal) * 100, 100);
    const achievePos = Math.min((d.target_achieve / maxVal) * 100, 100);
    document.getElementById("bar-maintain").style.left = maintainPos + "%";
    document.getElementById("bar-achieve").style.left = achievePos + "%";
    document.getElementById("bar-maintain-flag").textContent = "維持 " + fmt(d.target_maintain);
    document.getElementById("bar-achieve-flag").textContent = "達成 " + fmt(d.target_achieve);

    // 維持・達成ラインが近すぎる場合、達成側の旗を上にずらして重なりを回避
    const achieveFlag = document.getElementById("bar-achieve-flag");
    if (Math.abs(achievePos - maintainPos) < 12) {
      achieveFlag.style.top = "-54px";
    } else {
      achieveFlag.style.top = "-34px";
    }
  }

  document.getElementById("bar-current-label").textContent = "現在の売上　" + fmt(d.sales);

  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";
}

async function savePlannedDays() {
  const val = document.getElementById("planned-input").value;
  const msg = document.getElementById("planned-msg");
  const btn = document.getElementById("planned-save-btn");
  if (val === "" || isNaN(val)) {
    msg.textContent = "数値を入力してください";
    msg.style.color = "#d9534f";
    return;
  }
  btn.disabled = true;
  try {
    const res = await fetch(`${BASE_URL}/staff/target`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ staff_id: staffId, month: month, planned_work_days: parseInt(val) })
    });
    const data = await res.json();
    if (data.error) {
      msg.textContent = data.error;
      msg.style.color = "#d9534f";
    } else {
      msg.textContent = "保存しました（再読み込みで目標値が更新されます）";
      msg.style.color = "#2eb872";
    }
  } catch(e) {
    msg.textContent = "通信エラー";
    msg.style.color = "#d9534f";
  } finally {
    btn.disabled = false;
  }
}

function fmt(n) {
  if (n == null || n === 0) return "¥0";
  return "¥" + n.toLocaleString();
}

loadData();
</script>
</body>
</html>
